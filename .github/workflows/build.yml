name: Build App

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      os:
        description: 'Target OS (windows, macos, or both)'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - windows
          - macos
      api_key:
        description: 'OpenRouter API key (leave empty to use GitHub Secret)'
        required: false
        type: string
      custom_branch:
        description: 'Branch to build from (default: main)'
        required: false
        default: 'main'
        type: string

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: >-
          ${{
            (github.event_name == 'workflow_dispatch' && github.event.inputs.os == 'windows') && fromJSON('["windows-latest"]') ||
            (github.event_name == 'workflow_dispatch' && github.event.inputs.os == 'macos') && fromJSON('["macos-latest"]') ||
            fromJSON('["windows-latest", "macos-latest"]')
          }}

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.custom_branch || github.ref }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Inject API key into config
      env:
        API_KEY: ${{ github.event.inputs.api_key || secrets.API_KEY }}
      shell: bash
      run: |
        python << 'PYEOF'
        import yaml, os
        key = os.environ.get('API_KEY', '')
        if not key:
            print('No API_KEY env var — skipping injection')
        else:
            with open('config.yml', 'r') as f:
                cfg = yaml.safe_load(f)
            cfg.setdefault('llm_settings', {})['api_key'] = key
            with open('config.yml', 'w') as f:
                yaml.dump(cfg, f, allow_unicode=True)
            print('API key injected into config.yml')
        PYEOF

    - name: Install Pandoc (Windows)
      if: runner.os == 'Windows'
      run: choco install pandoc

    - name: Install Pandoc (macOS)
      if: runner.os == 'macOS'
      run: brew install pandoc

    - name: Build Python Executable
      run: |
        pyinstaller pyinstaller.spec

    - name: Test Pipeline (CI)
      continue-on-error: true
      env:
        PYTHONIOENCODING: utf-8
      run: |
        python scripts/test_pipeline.py

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Electron Dependencies
      working-directory: ./electron-app
      run: npm install

    - name: Build Electron App (Windows)
      if: runner.os == 'Windows'
      working-directory: ./electron-app
      run: npm run dist -- --win

    - name: Build Electron App (macOS)
      if: runner.os == 'macOS'
      working-directory: ./electron-app
      run: npm run dist -- --mac

    - name: Upload Artifacts (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Installer
        path: electron-app/dist/*.exe

    - name: Upload Artifacts (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: macOS-Installer
        path: electron-app/dist/*.pkg
